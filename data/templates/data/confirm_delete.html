{% extends 'users/base.html' %}
{% block title %}Delete - Mental Fitness Coach{% endblock %}
{% block content %}
<div class="card text-center" style="max-width:400px;margin:0 auto;">
    <h2>Delete?</h2>
    <p class="text-muted">Delete entry from {{ entry.date|date:"F d, Y" }}?</p>
    <form method="post">{% csrf_token %}
        <button type="submit" class="btn" style="background:#dc3545;">Delete</button>
        <a href="{% url 'data:history' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
